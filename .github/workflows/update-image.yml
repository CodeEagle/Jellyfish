name: Update Jellyfish Image

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if upstream commit is unchanged"
        required: false
        default: false
        type: boolean
      target_version:
        description: "Target upstream ref (commit/tag/branch). Leave empty for upstream default branch HEAD."
        required: false
        default: ""
        type: string
      publish_to_store:
        description: "Publish to LazyCat App Store"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 */6 * * *"

env:
  UPSTREAM_REPO: Forget-C/Jellyfish

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve upstream ref
        id: resolve-upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_REF="${{ inputs.target_version }}"
          if [ -n "$TARGET_REF" ]; then
            RESOLVED_SHA=$(gh api "repos/${UPSTREAM_REPO}/commits/${TARGET_REF}" --jq '.sha')
          else
            DEFAULT_BRANCH=$(gh api "repos/${UPSTREAM_REPO}" --jq '.default_branch')
            RESOLVED_SHA=$(gh api "repos/${UPSTREAM_REPO}/commits/${DEFAULT_BRANCH}" --jq '.sha')
          fi

          SHORT_SHA=$(printf '%s' "$RESOLVED_SHA" | cut -c1-7)
          echo "resolved_sha=$RESOLVED_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build-image
        run: |
          IMAGE_TAG=$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}:${IMAGE_TAG}"

          docker build \
            --build-arg UPSTREAM_REPO="${UPSTREAM_REPO}" \
            --build-arg UPSTREAM_REF="${{ steps.resolve-upstream.outputs.resolved_sha }}" \
            -t "$IMAGE" .

          docker push "$IMAGE"

          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "source_version=${{ steps.resolve-upstream.outputs.short_sha }}" >> "$GITHUB_OUTPUT"
